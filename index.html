<meta charset="utf-8"/>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<title>Extreme Flip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<style>
        html, body {
            width: 100%;
            height: 100%;
            padding: 0px;
            margin: 0px;
        }
        .fullscreen {
            background: #000000;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0px;
            left: 0px;
        }
        #loading-cover {
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #unity-loading-bar {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #unity-progress-bar-empty {
            width: 30%;
            height: 12px;
            margin: 10px 20px 20px 10px;
            text-align: left;
            background: #202020;
        }
        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #007EBD;
        }
    </style>
<script src="/sdk.js"></script>
</head>
<body>
<canvas id="canvas" class="fullscreen"></canvas>
<div id="loading-cover" class="fullscreen">
<div id="unity-loading-bar">
<div id="unity-progress-bar-empty">
<div id="unity-progress-bar-full"></div>
</div>
</div>
</div>
<script>
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            let meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
        }

        let canvas = document.getElementById('canvas');
        let loadingCover = document.getElementById('loading-cover');
        let progressBarEmpty = document.getElementById('unity-progress-bar-empty');
        let progressBarFull = document.getElementById('unity-progress-bar-full');

        document.addEventListener('contextmenu', event => event.preventDefault());

        function FocusGame() {
            window.focus();
            canvas.focus();
        }

        window.addEventListener('pointerdown', () => {
            FocusGame();
        });

        window.addEventListener('touchstart', () => {
            FocusGame();
        });

        let v_ysdk;
        let v_player;
        let v_game_instance;
        let v_sdk_init = false;

        function GameReadyNow(){
            v_ysdk.features.LoadingAPI?.ready();
        }

        function GameplayStart(){
            v_ysdk.features.GameplayAPI.start();
        }

        function GameplayStop(){
            v_ysdk.features.GameplayAPI.stop();
        }

        function FullAdShow() {
            v_ysdk.adv.showFullscreenAdv({
                callbacks: {
                    onOpen: () => {
                        v_game_instance.SendMessage('YAds', 'FullscreenAdOpen');
                    },
                    onClose: (wasShown) => {
                        v_game_instance.SendMessage('YAds', 'FullscreenAdClosed');
                    },
                    onError: (error) => {
                        v_game_instance.SendMessage('YAds', 'FullscreenAdError');
                    }
                }
            });
        }

        function RewardAdShow() {
            v_ysdk.adv.showRewardedVideo({
                callbacks: {
                    onOpen: () => {
                        v_game_instance.SendMessage('YAds', 'RewardAdOpen');
                    },
                    onClose: () => {
                        v_game_instance.SendMessage('YAds', 'RewardAdClosed');
                    },
                    onRewarded: () => {
                        v_game_instance.SendMessage('YAds', 'RewardAdRewarded');
                    },
                    onError: (e) => {
                        v_game_instance.SendMessage('YAds', 'RewardAdError');
                    }
                }
            });
        }

        YaGames.init().then(ysdk => {
            v_ysdk = ysdk;

            v_ysdk.getPlayer({ scopes: false }).then(_player => {

                v_player = _player;
                v_sdk_init = true;

                console.log("sdk initialized");

                let unityLoader = document.createElement("script");
                unityLoader.src = 'Build/Build.loader.js';
                unityLoader.onload = () => {
                    createUnityInstance(
                      canvas,
                      {
                          dataUrl: 'Build/Build.data.unityweb',
                          frameworkUrl: 'Build/Build.framework.js.unityweb',
                          codeUrl: 'Build/Build.wasm.unityweb',
                          streamingAssetsUrl: 'StreamingAssets',
                          companyName: 'Neptune Games',
                          productName: 'Extreme Flip',
                          productVersion: '0.0.0.9',
                      },
                      (progress) => {
                        progressBarFull.style.width = `${ progress * 100 }%`;
                      })
                    .then((unityInstance) => {
                        v_game_instance = unityInstance;
                        loadingCover.style.display = "none";
                        canvas.focus();
                    }).catch((message) => {
                        console.error(message);
                    });
                };

                document.body.appendChild(unityLoader);
            })
            .catch(err => {});
        });
    </script>
</body>
</html>
